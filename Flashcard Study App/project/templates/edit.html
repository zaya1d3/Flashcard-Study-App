{% extends "layout.html" %}

{% block title %}Edit Flashcard{% endblock %}

{% block main %}
<h1>Edit Flashcard</h1>
<form method="post" class="form-card">
    <label for="question">Question</label>
    <input id="question" name="question" value="{{ card.question }}" required>
    <label for="answer">Answer</label>
    <input id="answer" name="answer" value="{{ card.answer }}" required>
    <button type="submit" class="btn">Save Changes</button>
    <a href="/" class="btn" style="background:#a0aec0;">Cancel</a>
</form>
{% endblock %}
